<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Dyqani Im</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-image: url("01988_tarantulatree.jpg");
    background-size: cover;
    color: white;
}

body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

.container {
    padding: 20px;
}

h1, h2 {
    text-align: center;
}

.login {
    text-align: center;
}

input {
    padding: 8px;
    margin: 5px;
}

button {
    padding: 8px 12px;
    background: green;
    color: white;
    border: none;
}

.produkt {
    background: rgba(255,255,255,0.1);
    margin: 10px;
    padding: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🛒 Dyqani Im</h1>

<div class="login">
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Hyr si Admin</button>
    <p id="mesazhi"></p>
</div>

<hr>

<h2>Produktet</h2>

<div class="produkt">
    📱 Telefon - 300€
</div>

<div class="produkt">
    💻 Laptop - 700€
</div>

<div class="produkt">
    🍳 Kuzhinë - 50€
</div>

</div>

<script>
function login() {
    let username = document.getElementById("user").value;
    let password = document.getElementById("pass").value;

    if(username === "admin" && password === "1234") {
        document.getElementById("mesazhi").innerHTML = "✅ Mirësevjen Admin!";
    } else {
        document.getElementById("mesazhi").innerHTML = "❌ Gabim username ose password!";
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Dyqani Im</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

h1 { margin-top: 20px; }

.buttons button {
  margin: 5px;
  padding: 8px 12px;
  cursor: pointer;
}

#products {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.product {
  background: white;
  border: 1px solid #ccc;
  margin: 10px;
  padding: 10px;
  width: 180px;
}

.product img {
  width: 150px;
  height: 150px;
  object-fit: cover;
}

button {
  margin-top: 5px;
  cursor: pointer;
}

#cart {
  margin-top: 20px;⁸
}
</style>
</head>

<body>

<h1>🛒 Dyqani Im</h1>

<div class="buttons">
  <button onclick="filterProducts('all')">Të gjitha</button>
  <button onclick="filterProducts('meshkuj')">Meshkuj</button>
  <button onclick="filterProducts('femra')">Femra</button>
</div>

<div id="products"></div>

<h2>🛍️ Shporta</h2>
<ul id="cart"></ul>

<div id="adminPanel">
  <h2>Admin Panel</h2>
  <input type="text" id="pname" placeholder="Emri produktit">
  <input type="number" id="pprice" placeholder="Çmimi">
  <input type="text" id="pimage" placeholder="Link i fotos">

  <select id="pcategory">
    <option value="meshkuj">Meshkuj</option>
    <option value="femra">Femra</option>
  </select>

  <br><br>
  <button onclick="addProduct()">Shto Produkt</button>
</div>

<div id="auth">
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="register()">Regjistrohu</button>
  <button onclick="login()">Hyr</button>
  <button onclick="logout()">Dil</button>
</div>

<p id="welcome"></p>

<script>

// 🔥 PRODUKTET (ME STORAGE)
let products = [];

try {
  const saved = JSON.parse(localStorage.getItem("products"));
  if (saved && Array.isArray(saved)) {
    products = saved;
  } else {
    throw "empty";
  }
} catch (e) {
  products = [
    {
      name: "Këpucë Nike",
      price: 50,
      category: "meshkuj",
      image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff"
    },
    {
      name: "Xhaketa",
      price: 120,
      category: "meshkuj",
      image: "https://images.unsplash.com/photo-1520975922284-9c7a7f7c8b59"
    },
    {
      name: "Çantë Femrash",
      price: 80,
      category: "femra",
      image: "https://images.unsplash.com/photo-1584917865442-de89df76afd3"
    }
  ];
}
];
];

// 🛒 SHPORTA
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// ✅ SHFAQ PRODUKTET
function showProducts(list) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach((p, index) => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.price}€</p>
        <button onclick="addToCart('${p.name}', ${p.price})">Shto në shportë</button>
        <br>
        <button onclick="deleteProduct(${index})">❌ Fshij</button>
      </div>
    `;
  });
}

// ➕ SHTO PRODUKT
function addProduct() {
  const name = document.getElementById("pname").value;
  const price = document.getElementById("pprice").value;
  const image = document.getElementById("pimage").value;
  const category = document.getElementById("pcategory").value;

  if(name && price && image){
    products.push({
      name,
      price: Number(price),
      category,
      image
    });

    localStorage.setItem("products", JSON.stringify(products));
    showProducts(products);

    document.getElementById("pname").value = "";
    document.getElementById("pprice").value = "";
    document.getElementById("pimage").value = "";
  }
}

// ❌ FSHIJ PRODUKT
function deleteProduct(index) {
  products.splice(index, 1);
  localStorage.setItem("products", JSON.stringify(products));
  showProducts(products);
}

// 🔍 FILTER
function filterProducts(category) {
  if (category === "all") {
    showProducts(products);
  } else {
    showProducts(products.filter(p => p.category === category));
  }
}

// 🛍️ SHTO NE SHPORTË
function addToCart(name, price) {
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  showCart();
}

// 🧾 SHFAQ SHPORTËN
function showCart() {
  const lista = document.getElementById("cart");
  lista.innerHTML = "";

  cart.forEach(item => {
    lista.innerHTML += `<li>${item.name} - ${item.price}€</li>`;
  });
}

// 🔐 LOGIN
let user = null;

function register() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if(username && password){
    localStorage.setItem("user", JSON.stringify({username, password}));
    alert("U regjistrove!");
  }
}

function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const savedUser = JSON.parse(localStorage.getItem("user"));

  if(savedUser && username === savedUser.username && password === savedUser.password){
    user = username;
    document.getElementById("welcome").innerText = "Mirë se erdhe " + user;
  } else {
    alert("Gabim!");
  }
}

function logout() {
  user = null;
  document.getElementById("welcome").innerText = "";
}

// 🚀 LOAD
window.onload = function() {
  showProducts(products);
  showCart();
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Dyqani Im</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

h1 {
  margin-top: 20px;
}

.buttons button {
  margin: 5px;
  padding: 8px 12px;
  cursor: pointer;
}

#products {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.product {
  background: white;
  border: 1px solid #ccc;
  margin: 10px;
  padding: 10px;
  width: 180px;
}

.product img {
  width: 150px;
  height: 150px;
  object-fit: cover;
}

button {
  margin-top: 5px;
  cursor: pointer;
}

#cart {
  margin-top: 20px;
}
</style>

</head>
<body>

<h1>🛒 Dyqani Im</h1>

<div class="buttons">
  <button onclick="filterProducts('all')">Të gjitha</button>
  <button onclick="filterProducts('meshkuj')">Meshkuj</button>
  <button onclick="filterProducts('femra')">Femra</button>
</div>

<div id="products"></div>

<h2>🛍️ Shporta</h2>
<ul id="cart"></ul>
<div id="adminPanel">
  <h2>Admin Panel</h2>

  <input type="text" id="pname" placeholder="Emri produktit">
  <input type="number" id="pprice" placeholder="Çmimi">
  <input type="text" id="pimage" placeholder="Link i fotos">

  <select id="pcategory">
    <option value="meshkuj">Meshkuj</option>
    <option value="femra">Femra</option>
  </select>

  <br><br>
  <button onclick="addProduct()">Shto Produkt</button>
</div>
<div id="auth">
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="register()">Regjistrohu</button>
  <button onclick="login()">Hyr</button>
  <button onclick="logout()">Dil</button>
</div>

<p id="welcome"></p>
<script>
  // PRODUKTET
const products = [
  {
    name: "Këpucë Nike",
    price: 50,
    category: "meshkuj",
    image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff"
  },
  {
    name: "Xhaketa",
    price: 120,
    category: "meshkuj",
    image: "https://images.unsplash.com/photo-1520975922284-9c7a7f7c8b59"
  },
  {
    name: "Çantë Femrash",
    price: 80,
    category: "femra",
    image: "https://images.unsplash.com/photo-1584917865442-de89df76afd3"
  }
];
function addProduct() {
  const name = document.getElementById("pname").value;
  const price = document.getElementById("pprice").value;
  const image = document.getElementById("pimage").value;
  const category = document.getElementById("pcategory").value;

  if(name && price && image && category){
    products.push({
      name: name,
      price: Number(price),
      category: category,
      image: image
    });

    showProducts(products);

    // pastro fushat
    document.getElementById("pname").value = "";
    document.getElementById("pprice").value = "";
    document.getElementById("pimage").value = "";
  }
}
// MODELET (5 foto për secilin produkt)
const models = {
  "Këpucë Nike": [
    "https://images.unsplash.com/photo-1542291026-7eec264c27ff",
    "https://images.unsplash.com/photo-1600180758890-6b94519a8ba6",
    "https://images.unsplash.com/photo-1519741497674-611481863552",
    "https://images.unsplash.com/photo-1528701800489-20be3c7b3a3e",
    "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a"
  ],
  "Xhaketa": [
    "https://images.unsplash.com/photo-1520975922284-9c7a7f7c8b59",
    "https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb",
    "https://images.unsplash.com/photo-1516822003754-cca485356ecb",
    "https://images.unsplash.com/photo-1495105787522-5334e3ffa0ef",
    "https://images.unsplash.com/photo-1544441893-675973e31985"
  ],
  "Çantë Femrash": [
    "https://images.unsplash.com/photo-1584917865442-de89df76afd3",
    "https://images.unsplash.com/photo-1591561954557-26941169b49e",
    "https://images.unsplash.com/photo-1600180758890-6b94519a8ba6",
    "https://images.unsplash.com/photo-1524499982521-1ffd58dd89ea",
    "https://images.unsplash.com/photo-1585487000160-6ebcfceb0d03"
  ]
};

let cart = [];

// SHFAQ PRODUKTET
function showProducts(list) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.image}" style="width:100%">
        <h3>${p.name}</h3>
        <p>${p.price}€</p>
        <button onclick="addToCart('${p.name}', ${p.price})">Shto në shportë</button>
        <br>
        <button onclick="showModels('${p.name}')">Shfaq modele</button>
      </div>
    `;
  });
}

// FILTRIM
function filterProducts(category) {
  if (category === "all") {
    showProducts(products);
  } else {
    showProducts(products.filter(p => p.category === category));
  }
}

// SHFAQ MODELET
function showModels(name) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  models[name].forEach(img => {
    container.innerHTML += `
      <div class="product">
        <img src="${img}">
        <h3>${name}</h3>
        <p>99€</p>
        <button onclick="addToCart('${name}', 99)">Shto në shportë</button>
      </div>
    `;
  });

  container.innerHTML += `<br><button onclick="showProducts(products)">⬅ Kthehu</button>`;
}

// SHPORTA
function addToCart(name, price) {
  cart.push({name, price});
  showCart();
}

function showCart() {
  const lista = document.getElementById("cart");
  lista.innerHTML = "";

  cart.forEach(item => {
    lista.innerHTML += `<li>${item.name} - ${item.price}€</li>`;
  });
}

// LOAD
showProducts(products);
// USER DATA
let user = null;

function register() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if(username && password){
    localStorage.setItem("user", JSON.stringify({username, password}));
    alert("U regjistrove!");
  } else {
    alert("Plotëso të dhënat!");
  }
}

function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const savedUser = JSON.parse(localStorage.getItem("user"));

  if(savedUser && username === savedUser.username && password === savedUser.password){
    user = username;
    document.getElementById("welcome").innerText = "Mirë se erdhe " + user;
  } else {
    alert("Gabim!");
  }
}

function logout() {
  user = null;
  document.getElementById("welcome").innerText = "";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dyqani Im</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🛒 Dyqani Im</h1>

    <h2>🛍️ Shporta</h2>

    <!-- Login form -->
    <div>
        <input type="text" placeholder="Username" id="username">
        <input type="password" placeholder="Password" id="password">
        <button onclick="login()">Hyr si Admin</button>
    </div>

    <hr>

    <!-- Produkte -->
    <h2>Produktet</h2>

    <div>
        <p>📱 Telefon - 300€</p>
        <button onclick="shtoNeShporte('Telefon')">Shto në shportë</button>
    </div>

    <div>
        <p>💻 Laptop - 700€</p>
        <button onclick="shtoNeShporte('Laptop')">Shto në shportë</button>
    </div>

    <div>
        <p>🎧 Kufje - 50€</p>
        <button onclick="shtoNeShporte('Kufje')">Shto në shportë</button>
    </div>

    <hr>

    <!-- Lista e shportes -->
    <h2>🛒 Produktet në shportë:</h2>
    <ul id="listaShportes"></ul>

    <script>
        let shporta = [];

        function shtoNeShporte(produkti) {
            shporta.push(produkti);
            shfaqShporten();
        }

        function shfaqShporten() {
            let lista = document.getElementById("listaShportes");
            lista.innerHTML = "";

            shporta.forEach(p => {
                let li = document.createElement("li");
                li.textContent = p;
                lista.appendChild(li);
            });
        }

        function login() {
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            if (user === "admin" && pass === "1234") {
                alert("Mirësevjen Admin!");
            } else {
                alert("Gabim username ose password!");
            }
        }
    </script>

</body>
</html>

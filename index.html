<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <title>Dyqani Im</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dyqani Im 🛒</h1>

<div class="menu">
  <button onclick="filterProducts('all')">Të gjitha</button>
  <button onclick="filterProducts('men')">Men</button>
  <button onclick="filterProducts('women')">Women</button>
</div>

<div id="products" class="products"></div>

<h2>🛒 Shporta</h2>
<ul id="cart"></ul>

<script>
let products = [
  {
    name: "Këpucë Nike",
    price: 50,
    category: "men",
    image: "https://images.unsplash.com/photo-1"
  },
  {
    name: "Xhaketa",
    price: 120,
    category: "men",
    image: "https://images.unsplash.com/photo-2"
  },
  {
    name: "Çantë Femrash",
    price: 80,
    category: "women",
    image: "https://images.unsplash.com/photo-3"
  }
];

function filterProducts(category) {
  const productsDiv = document.getElementById('products');
  productsDiv.innerHTML = '';

  const filtered = category === 'all' ? products : products.filter(p => p.category === category);

  filtered.forEach(p => {
    const div = document.createElement('div');
    div.classList.add('product');

    const img = document.createElement('img');
    img.src = p.image;
    div.appendChild(img);

    const name = document.createElement('h3');
    name.innerText = p.name;
    div.appendChild(name);

    const price = document.createElement('p');
    price.innerText = p.price + '€';
    div.appendChild(price);

    // button për të shfaqur 5 modelet
    const btn = document.createElement('button');
    btn.innerText = 'Shfaq modele';
    btn.onclick = () => showModels(p.name);
    div.appendChild(btn);

    productsDiv.appendChild(div);
  });
}

function showModels(productName) {
  const productsDiv = document.getElementById('products');
  productsDiv.innerHTML = '';

  // 5 foto shembull për çdo produkt
  const models = [
    'https://images.unsplash.com/photo-1',
    'https://images.unsplash.com/photo-2',
    'https://images.unsplash.com/photo-3',
    'https://images.unsplash.com/photo-4',
    'https://images.unsplash.com/photo-5'
  ];

  models.forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    img.style.width = '150px';
    img.style.height = '150px';
    img.style.margin = '10px';
    productsDiv.appendChild(img);
  });
}

// shfaq të gjithë produktet në fillim
filterProducts('all');
  let products = [
  {
    name: "Këpucë Nike",
    price: 50,
    category: "men",
    image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=500&q=60"
  },
  {
  name: "Xhaketa",
  price: 120,
  category: "men",
  image: "https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=500&q=60"
},
  {
    name: "Çantë Femrash",
    price: 80,
    category: "women",
    image: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?auto=format&fit=crop&w=500&q=60"
  }
];

let cart = [];

function showProducts(list) {
  let container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.price}€</p>
        <button onclick="addToCart('${p.name}', ${p.price})">
          Shto në shportë
        </button>
      </div>
    `;
  });
}

function filterProducts(category) {
  if (category === "all") {
    showProducts(products);
  } else {
    let filtered = products.filter(p => p.category === category);
    showProducts(filtered);
  }
}

function addToCart(name, price) {
  cart.push({name, price});
  showCart();
}

function showCart() {
  let lista = document.getElementById("cart");
  lista.innerHTML = "";

  cart.forEach(item => {
    lista.innerHTML += `<li>${item.name} - ${item.price}€</li>`;
  });
}

// load fillestar
showProducts(products);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <title>Dyqani Im</title>
  <style>
    body { font-family: Arial; text-align: center; }
    .products { display: flex; flex-wrap: wrap; justify-content: center; }
    .product {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px;
      width: 180px;
    }
    img { width: 150px; height: 150px; }
    button { margin-top: 5px; }
  </style>
</head>
<body>

<h1>🛒 Dyqani Im</h1>

<div>
  <button onclick="filterProducts('all')">Të gjitha</button>
  <button onclick="filterProducts('men')">Meshkuj</button>
  <button onclick="filterProducts('women')">Femra</button>
</div>

<div id="products" class="products"></div>

<h2>🛍️ Shporta</h2>
<ul id="cart"></ul>

<script>
// PRODUKTET
let products = [
  {
    name: "Këpucë Nike",
    price: 50,
    category: "men",
    image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff"
  },
  {
    name: "Xhaketa",
    price: 120,
    category: "men",
    image: "https://images.unsplash.com/photo-1520975922284-9c7a7f7c8b59"
  },
  {
    name: "Çantë Femrash",
    price: 80,
    category: "women",
    image: "https://images.unsplash.com/photo-1584917865442-de89df76afd3"
  }
];

let cart = [];

// SHFAQ PRODUKTET
function showProducts(list) {
  let container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.price}€</p>
        <button onclick="addToCart('${p.name}', ${p.price})">
          Shto në shportë
        </button>
        <br>
        <button onclick="showModels('${p.name}')">
          Shfaq modele
        </button>
      </div>
    `;
  });
}

// FILTER
function filterProducts(category) {
  if (category === "all") {
    showProducts(products);
  } else {
    let filtered = products.filter(p => p.category === category);
    showProducts(filtered);
  }
}

// SHPORTA
function addToCart(name, price) {
  cart.push({name, price});
  showCart();
}

function showCart() {
  let lista = document.getElementById("cart");
  lista.innerHTML = "";

  cart.forEach(item => {
    lista.innerHTML += `<li>${item.name} - ${item.price}€</li>`;
  });
}

// MODELET (5 foto për çdo produkt)
function showModels(productName) {
  const productsDiv = document.getElementById("products");
  productsDiv.innerHTML = "";

  const allModels = {
    "Këpucë Nike": [
      "https://images.unsplash.com/photo-1542291026-7eec264c27ff",
      "https://images.unsplash.com/photo-1600180758890-6b94519a8ba6",
      "https://images.unsplash.com/photo-1519741497674-611481863552",
      "https://images.unsplash.com/photo-1528701800489-20be3c7c2f38",
      "https://images.unsplash.com/photo-1584735175315-9d5df23860e6"
    ],
    "Xhaketa": [
      "https://images.unsplash.com/photo-1520975922284-9c7a7f7c8b59",
      "https://images.unsplash.com/photo-1544441893-675973e31985",
      "https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb",
      "https://images.unsplash.com/photo-1516822003754-cca485356ecb",
      "https://images.unsplash.com/photo-1495105787522-5334e3ffa0ef"
    ],
    "Çantë Femrash": [
      "https://images.unsplash.com/photo-1584917865442-de89df76afd3",
      "https://images.unsplash.com/photo-1591561954557-26941169b49e",
      "https://images.unsplash.com/photo-1585487000160-6ebcfceb0d03",
      "https://images.unsplash.com/photo-1600180758890-6b94519a8ba6",
      "https://images.unsplash.com/photo-1524499982521-1ffd58dd89ea"
    ]
  };

  let models = allModels[productName];
  if (!models) return;

  models.forEach(src => {
    productsDiv.innerHTML += `
      <div class="product">
        <img src="${src}">
        <h3>${productName}</h3>
        <p>99€</p>
        <button onclick="addToCart('${productName}', 99)">
          Shto në shportë
        </button>
      </div>
    `;
  });

  // BUTON BACK
  productsDiv.innerHTML += `
    <br><button onclick="showProducts(products)">Kthehu</button>
  `;
}

// START
showProducts(products);

</script>

</body>
</html>

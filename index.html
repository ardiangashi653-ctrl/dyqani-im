<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Dyqani Im</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
}

.product {
    background: white;
    margin: 10px auto;
    padding: 10px;
    width: 200px;
    border-radius: 10px;
}

button {
    padding: 8px 12px;
    margin: 5px;
    cursor: pointer;
}

#adminPanel {
    display: none;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🛒 Dyqani Im</h1>

<div>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Hyr si Admin</button>
</div>

<p id="msg"></p>

<div id="products"></div>

<div id="adminPanel">
    <h2>Admin Panel</h2>

    <input id="pname" placeholder="Emri produktit">
    <input id="pprice" placeholder="Çmimi">
    <input id="pimg" placeholder="Link foto">

    <br>
    <button onclick="addProduct()">Shto Produkt</button>
</div>

<script>

let products = [
    {name: "Telefon", price: 300, img: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
    {name: "Laptop", price: 700, img: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
    {name: "Kufje", price: 50, img: "https://images.unsplash.com/photo-1580894894513-541e068a3e2b"}
];

function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "admin" && p === "1234") {
        document.getElementById("adminPanel").style.display = "block";
        document.getElementById("msg").innerHTML = "✅ Mirë se erdhe Admin";
    } else {
        document.getElementById("msg").innerHTML = "❌ Gabim!";
    }
}

function addProduct() {
    let name = document.getElementById("pname").value;
    let price = document.getElementById("pprice").value;
    let img = document.getElementById("pimg").value;

    products.push({name, price, img});
  localStorage.setItem("products", JSON.stringify(products));
  
    showProducts();
}

function showProducts() {
    let html = "";

  products.forEach((p, i) => { 
        html += `
        <div class="product">
            <img src="${p.img}" width="150"><br>
            <b>${p.name}</b><br>
            ${p.price}€<br>     
<button onclick="orderProduct(${i})">Porosit</button>
        </div>
        `;
    });
    
document.getElementById("products")
    .innerHTML = html;
    }            

// KJO ËSHTË SHUMË E RËNDËSISHME
showProducts();
function orderProduct(index) {
    let selected = products[index];

    alert("Porosia u bë për: " + selected.name + " - " + selected.price + "€");

    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    orders.push(selected);

    localStorage.setItem("orders", JSON.stringify(orders));
}
</script>

</body>
</html>

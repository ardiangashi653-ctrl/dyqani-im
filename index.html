<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Dyqani Im</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
}

.product {
    background: white;
    margin: 10px auto;
    padding: 10px;
    width: 200px;
    border-radius: 10px;
}

button {
    padding: 8px 12px;
    margin: 5px;
    cursor: pointer;
}

#adminPanel {
    display: none;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🛒 Dyqani Im</h1>
<div style="position: fixed; top: 10px; right: 10px;">
    <button onclick="toggleCart()">🛒</button>

    <div id="cartBox" style="display:none; background:white; padding:10px; border:1px solid black;">
        <div id="cart"></div>
    </div>
</div>
<div>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Hyr si Admin</button>
</div>
<p id="msg"></p>
    
<div id="products"></div>

<div id="adminPanel">
    <h2>Admin Panel</h2>

    <input id="pname" placeholder="Emri produktit">
    <input id="pprice" placeholder="Çmimi">
    <input id="pimg" placeholder="Link foto">

    <br>
    <button onclick="addProduct()">Shto Produkt</button>
</div>

<script>

let products = [
    {name: "Telefon", price: 300, img: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
    {name: "Laptop", price: 700, img: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
    {name: "Kufje", price: 50, img: "https://images.unsplash.com/photo-1580894894513-541e068a3e2b"}
];

function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "admin" && p === "1234") {
        document.getElementById("adminPanel").style.display = "block";
        document.getElementById("msg").innerHTML = "✅ Mirë se erdhe Admin";
    } else {
        document.getElementById("msg").innerHTML = "❌ Gabim!";
    }
}

function addProduct() {
    let name = document.getElementById("pname").value;
    let price = document.getElementById("pprice").value;
    let img = document.getElementById("pimg").value;

    products.push({name, price, img});
  localStorage.setItem("products", JSON.stringify(products));
  
    showProducts();
}

function showProducts() {
    let html = "";

  products.forEach((p, i) => { 
        html += `
        <div class="product">
            <img src="${p.img}" width="150"><br>
            <b>${p.name}</b><br>
            ${p.price}€<br>     
<button onclick="goToProduct('${p.name}', ${p.price})">Shiko</button>
        </div>
        `;
    });
    
document.getElementById("products")
    .innerHTML = html;
    }            

// KJO ËSHTË SHUMË E RËNDËSISHME
showProducts();
showCart();
function orderProduct(index) {
    let selected = products[index];

    alert("Porosia u bë për: " + selected.name + " - " + selected.price + "€");

    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    orders.push(selected);

    localStorage.setItem("orders", JSON.stringify(orders));
}
function addToCart(index) {
    let product = products[index];

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push(product);

    localStorage.setItem("cart", JSON.stringify(cart));

    alert("Produkti u shtua ne shporte!");
}  
function showCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let html = "";
let total = 0;
    cart.forEach((p, i) => {
        total += p.price;
        html += `
<div>
  ${p.name} - ${p.price}€
  <button onclick="removeFromCart(${i})">❌</button>
</div>
`;
    });
    html += `<h3>Total: ${total}€</h3>`;
document.getElementById("cart").innerHTML = html;
    } 
    function removeFromCart(index) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.splice(index, 1);

    localStorage.setItem("cart", JSON.stringify(cart));

    showCart();
    }
    function toggleCart() {
    let box = document.getElementById("cartBox");

    if (box.style.display === "none") {
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
    }
function porosit() {

    let emri = document.getElementById("emri").value;
    let telefoni = document.getElementById("telefoni").value;
    let adresa = document.getElementById("adresa").value;

    let porosia = {
        emri: emri,
        telefoni: telefoni,
        adresa: adresa
    };

    let teDhenat = JSON.parse(localStorage.getItem("porosite")) || [];

    teDhenat.push(porosia);

    localStorage.setItem("porosite", JSON.stringify(teDhenat));

    alert("Porosia u dergua me sukses!");
}
    let selectedProduct = null;

function openPopup(name, price) {
    selectedProduct = { name: name, price: price };

    document.getElementById("popupName").innerText = name;
    document.getElementById("popupPrice").innerText = price + "€";

    document.getElementById("productPopup").style.display = "block";
}

function closePopup() {
    document.getElementById("productPopup").style.display = "none";
}

function addToCartFromPopup() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push(selectedProduct);

    localStorage.setItem("cart", JSON.stringify(cart));

    closePopup();
    showCart();

    }
    function goToProduct(name, price) {
    window.location.href = "product.html?name=" + name + "&price=" + price;
    }
</script>
    <div id="productPopup" style="display:none; position:fixed; bottom:0; left:0; width:100%; background:white; padding:15px; border-top:2px solid black;">
    
    <h3 id="popupName"></h3>
    <p id="popupPrice"></p>

    <button onclick="addToCartFromPopup()">Shto në Shportë</button>
    <button onclick="closePopup()">Mbyll</button>

    </div>
<h2>Porosit Produkt</h2>

<input id="emri" placeholder="Emri"><br><br>
<input id="telefoni" placeholder="Numri telefonit"><br><br>
<input id="adresa" placeholder="Adresa"><br><br>

<button onclick="porosit()">Dergo Porosi</button>
</body>
</html>

<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <title>Dyqani Im</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dyqani Im 🛒</h1>

<div class="menu">
  <button onclick="filterProducts('all')">Të gjitha</button>
  <button onclick="filterProducts('men')">Men</button>
  <button onclick="filterProducts('women')">Women</button>
</div>

<div id="products" class="products"></div>

<h2>🛒 Shporta</h2>
<ul id="cart"></ul>

<script>
let products = [
  {
    name: "Këpucë Nike",
    price: 50,
    category: "men",
    image: "https://via.placeholder.com/150"
  },
  {
    name: "Telefon iPhone",
    price: 300,
    category: "men",
    image: "https://via.placeholder.com/150"
  },
  {
    name: "Çantë Femrash",
    price: 80,
    category: "women",
    image: "https://via.placeholder.com/150"
  }
];

let cart = [];

function showProducts(list) {
  let container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.price}€</p>
        <button onclick="addToCart('${p.name}', ${p.price})">
          Shto në shportë
        </button>
      </div>
    `;
  });
}

function filterProducts(category) {
  if (category === "all") {
    showProducts(products);
  } else {
    let filtered = products.filter(p => p.category === category);
    showProducts(filtered);
  }
}

function addToCart(name, price) {
  cart.push({name, price});
  showCart();
}

function showCart() {
  let lista = document.getElementById("cart");
  lista.innerHTML = "";

  cart.forEach(item => {
    lista.innerHTML += `<li>${item.name} - ${item.price}€</li>`;
  });
}

// load fillestar
showProducts(products);
</script>

</body>
</html>
